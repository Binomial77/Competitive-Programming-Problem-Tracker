<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Problem Tracker — Create account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="brand">Problem Tracker</div>
    <div class="brand-sub">DSA Practice Log</div>

    <h2>Create account</h2>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="username">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Choose a password" autocomplete="new-password">
    </div>

    <button class="btn btn-primary" onclick="signup()">Create account</button>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener("keydown", e => {
      if (e.key === "Enter") signup()
    })
  </script>
</body>
</html>
